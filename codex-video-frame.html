<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Frame Capture</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0f172a;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #0f172a;
      }
    </style>
  </head>
  <body>
    <canvas id="frame"></canvas>
    <video id="video" src="./src/assets/video/productdetails.mp4" muted playsinline preload="auto"></video>
    <script>
      const params = new URLSearchParams(window.location.search);
      const time = Number(params.get("t") || 0);
      const video = document.getElementById("video");
      const canvas = document.getElementById("frame");
      const ctx = canvas.getContext("2d");

      function drawFrame() {
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.round(window.innerWidth * ratio);
        canvas.height = Math.round(window.innerHeight * ratio);
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const scale = Math.min(
          canvas.width / video.videoWidth,
          canvas.height / video.videoHeight
        );
        const width = video.videoWidth * scale;
        const height = video.videoHeight * scale;
        const x = (canvas.width - width) / 2;
        const y = (canvas.height - height) / 2;
        ctx.drawImage(video, x, y, width, height);
        window.frameReady = true;
      }

      video.addEventListener("loadedmetadata", () => {
        video.currentTime = Math.min(time, Math.max(0, video.duration - 0.2));
      });

      video.addEventListener("seeked", drawFrame);
      video.addEventListener("error", () => {
        ctx.fillStyle = "#ffffff";
        ctx.font = "24px sans-serif";
        ctx.fillText("Unable to decode video", 40, 80);
      });
    </script>
  </body>
</html>
